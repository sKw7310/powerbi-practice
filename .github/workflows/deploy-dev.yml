name: Deploy to Dev

on:
  push:
    branches:
      - dev
    paths:
      - '**.pbip'
      - '**.Report/**'
      - '**.SemanticModel/**'
  workflow_dispatch:

jobs:
  deploy-to-dev:
    name: Publish to sales_dev workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 1: Get OAuth2 token ──────────────────────────────────────────
      - name: Get Azure AD access token
        id: get_token
        run: |
          echo "🔑 Requesting access token..."

          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.PBI_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.PBI_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.PBI_CLIENT_SECRET }}" \
            -d "scope=https://analysis.windows.net/powerbi/api/.default")

          ERROR=$(echo $TOKEN_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null)
          if [ -n "$ERROR" ]; then
            echo "❌ Auth failed: $ERROR"
            echo $TOKEN_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error_description',''))"
            exit 1
          fi

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Access token retrieved"

      # ── Step 2: Debug — print folder structure ────────────────────────────
      - name: Show PBIP folder structure
        run: |
          echo "📁 Repository structure:"
          find . -not -path "*/.git/*" -type f | sort | head -60

      # ── Step 3: Find PBIP files ───────────────────────────────────────────
      - name: Find PBIP files
        id: find_pbip
        run: |
          PBIP_FILES=$(find . -name "*.pbip" -not -path "*/.git/*" -type f)
          if [ -z "$PBIP_FILES" ]; then
            echo "❌ No .pbip files found"
            exit 1
          fi
          echo "📦 Found:"
          echo "$PBIP_FILES"
          echo "PBIP_FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$PBIP_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Step 4: Deploy Semantic Model ─────────────────────────────────────
      - name: Deploy Semantic Model to sales_dev
        run: |
          ACCESS_TOKEN="${{ steps.get_token.outputs.ACCESS_TOKEN }}"
          WORKSPACE_ID="${{ secrets.PBI_DEV_WORKSPACE_ID }}"

          while IFS= read -r PBIP_FILE; do
            [ -z "$PBIP_FILE" ] && continue

            REPORT_NAME=$(basename "$PBIP_FILE" .pbip)
            PBIP_DIR=$(dirname "$PBIP_FILE")
            MODEL_DIR="$PBIP_DIR/$REPORT_NAME.SemanticModel"

            echo ""
            echo "========== Semantic Model: $REPORT_NAME =========="

            if [ ! -d "$MODEL_DIR" ]; then
              echo "⚠️  No SemanticModel folder found at: $MODEL_DIR"
              continue
            fi

            echo "📁 SemanticModel contents:"
            find "$MODEL_DIR" -type f | sort

            # Build parts — paths relative to SemanticModel root
            PARTS_JSON=$(python3 - "$MODEL_DIR" << 'PYEOF'
          import os, base64, json, sys

          model_dir = sys.argv[1]
          parts = []

          for root, dirs, files in os.walk(model_dir):
              dirs[:] = sorted([d for d in dirs if not d.startswith('.')])
              for fname in sorted(files):
                  if fname.startswith('.'):
                      continue
                  fpath = os.path.join(root, fname)
                  rel_path = os.path.relpath(fpath, model_dir).replace('\\', '/')
                  with open(fpath, 'rb') as f:
                      content = base64.b64encode(f.read()).decode('utf-8')
                  parts.append({
                      "path": rel_path,
                      "payload": content,
                      "payloadType": "InlineBase64"
                  })
                  sys.stderr.write(f"  Added: {rel_path}\n")

          print(json.dumps(parts))
          PYEOF
          )

            # Check if semantic model already exists
            EXISTING=$(curl -s \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" \
              -H "Authorization: Bearer $ACCESS_TOKEN")

            EXISTING_ID=$(echo "$EXISTING" | python3 -c "
          import sys,json
          data = json.load(sys.stdin)
          items = data.get('value', [])
          match = [i for i in items if i.get('name','') == '$REPORT_NAME']
          print(match[0]['id'] if match else '')
          " 2>/dev/null)

            if [ -n "$EXISTING_ID" ]; then
              echo "→ Updating existing semantic model (ID: $EXISTING_ID)"
              PAYLOAD=$(echo "$PARTS_JSON" | python3 -c "
          import json,sys
          parts = json.loads(sys.stdin.read())
          print(json.dumps({'definition': {'parts': parts}}))
          ")
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                "https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/semanticModels/$EXISTING_ID/updateDefinition" \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
            else
              echo "→ Creating new semantic model"
              PAYLOAD=$(echo "$PARTS_JSON" | python3 -c "
          import json,sys
          parts = json.loads(sys.stdin.read())
          print(json.dumps({'displayName': '$REPORT_NAME', 'definition': {'parts': parts}}))
          ")
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                "https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/semanticModels" \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
            fi

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || [ "$HTTP_CODE" = "202" ]; then
              echo "✅ Semantic model deployed (HTTP $HTTP_CODE)"
            else
              echo "❌ Semantic model failed (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi

          done <<< "${{ steps.find_pbip.outputs.PBIP_FILES }}"

      # ── Step 5: Deploy Report ──────────────────────────────────────────────
      - name: Deploy Report to sales_dev
        run: |
          ACCESS_TOKEN="${{ steps.get_token.outputs.ACCESS_TOKEN }}"
          WORKSPACE_ID="${{ secrets.PBI_DEV_WORKSPACE_ID }}"

          while IFS= read -r PBIP_FILE; do
            [ -z "$PBIP_FILE" ] && continue

            REPORT_NAME=$(basename "$PBIP_FILE" .pbip)
            PBIP_DIR=$(dirname "$PBIP_FILE")
            REPORT_DIR="$PBIP_DIR/$REPORT_NAME.Report"

            echo ""
            echo "========== Report: $REPORT_NAME =========="

            if [ ! -d "$REPORT_DIR" ]; then
              echo "⚠️  No Report folder found at: $REPORT_DIR"
              continue
            fi

            echo "📁 Report contents:"
            find "$REPORT_DIR" -type f | sort

            # Build parts — paths relative to Report root
            PARTS_JSON=$(python3 - "$REPORT_DIR" << 'PYEOF'
          import os, base64, json, sys

          report_dir = sys.argv[1]
          parts = []

          for root, dirs, files in os.walk(report_dir):
              dirs[:] = sorted([d for d in dirs if not d.startswith('.')])
              for fname in sorted(files):
                  if fname.startswith('.'):
                      continue
                  fpath = os.path.join(root, fname)
                  rel_path = os.path.relpath(fpath, report_dir).replace('\\', '/')
                  with open(fpath, 'rb') as f:
                      content = base64.b64encode(f.read()).decode('utf-8')
                  parts.append({
                      "path": rel_path,
                      "payload": content,
                      "payloadType": "InlineBase64"
                  })
                  sys.stderr.write(f"  Added: {rel_path}\n")

          print(json.dumps(parts))
          PYEOF
          )

            # Check if report already exists
            EXISTING_REPORTS=$(curl -s \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/reports" \
              -H "Authorization: Bearer $ACCESS_TOKEN")

            EXISTING_REPORT_ID=$(echo "$EXISTING_REPORTS" | python3 -c "
          import sys,json
          data = json.load(sys.stdin)
          items = data.get('value', [])
          match = [i for i in items if i.get('name','') == '$REPORT_NAME']
          print(match[0]['id'] if match else '')
          " 2>/dev/null)

            if [ -n "$EXISTING_REPORT_ID" ]; then
              echo "→ Updating existing report (ID: $EXISTING_REPORT_ID)"
              PAYLOAD=$(echo "$PARTS_JSON" | python3 -c "
          import json,sys
          parts = json.loads(sys.stdin.read())
          print(json.dumps({'definition': {'parts': parts}}))
          ")
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                "https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/reports/$EXISTING_REPORT_ID/updateDefinition" \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
            else
              echo "→ Creating new report"
              PAYLOAD=$(echo "$PARTS_JSON" | python3 -c "
          import json,sys
          parts = json.loads(sys.stdin.read())
          print(json.dumps({'displayName': '$REPORT_NAME', 'definition': {'parts': parts}}))
          ")
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                "https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/reports" \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
            fi

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || [ "$HTTP_CODE" = "202" ]; then
              echo "✅ Report deployed (HTTP $HTTP_CODE)"
            else
              echo "❌ Report failed (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi

          done <<< "${{ steps.find_pbip.outputs.PBIP_FILES }}"

      # ── Step 6: Summary ───────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo ""
          echo "============================================"
          echo "  ✅  Deployed to sales_dev"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  By     : ${{ github.actor }}"
          echo "  URL    : https://app.powerbi.com/groups/${{ secrets.PBI_DEV_WORKSPACE_ID }}"
          echo "============================================"