name: Promote Dev to QA

on:
  pull_request:
    branches:
      - qa
    types:
      - closed
  workflow_dispatch:

jobs:
  promote-dev-to-qa:
    name: Promote Dev → QA via Deployment Pipeline
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure AD access token
        id: get_token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.PBI_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.PBI_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.PBI_CLIENT_SECRET }}" \
            -d "scope=https://analysis.windows.net/powerbi/api/.default")

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get access token"
            echo $TOKEN_RESPONSE
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Access token retrieved"

      - name: Get pipeline artifacts from Dev stage
        id: get_artifacts
        run: |
          ACCESS_TOKEN="${{ steps.get_token.outputs.ACCESS_TOKEN }}"
          PIPELINE_ID="${{ secrets.PBI_PIPELINE_ID }}"

          echo "🔍 Fetching Dev stage artifacts..."

          ARTIFACTS=$(curl -s \
            "https://api.powerbi.com/v1.0/myorg/pipelines/$PIPELINE_ID/stages/0/artifacts" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "Artifacts: $ARTIFACTS"

          # Extract dataset and report IDs
          DATASETS=$(echo "$ARTIFACTS" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          ids = [{'sourceId': i['artifactId']} for i in d.get('datasets', [])]
          print(json.dumps(ids))
          ")

          REPORTS=$(echo "$ARTIFACTS" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          ids = [{'sourceId': i['artifactId']} for i in d.get('reports', [])]
          print(json.dumps(ids))
          ")

          echo "Datasets: $DATASETS"
          echo "Reports: $REPORTS"

          echo "DATASETS=$DATASETS" >> $GITHUB_OUTPUT
          echo "REPORTS=$REPORTS" >> $GITHUB_OUTPUT

      - name: Trigger Deployment Pipeline — Dev to QA
        id: deploy
        run: |
          ACCESS_TOKEN="${{ steps.get_token.outputs.ACCESS_TOKEN }}"
          PIPELINE_ID="${{ secrets.PBI_PIPELINE_ID }}"
          DATASETS="${{ steps.get_artifacts.outputs.DATASETS }}"
          REPORTS="${{ steps.get_artifacts.outputs.REPORTS }}"

          # Build payload with explicit artifact IDs
          PAYLOAD=$(python3 -c "
          import json
          datasets = json.loads('$DATASETS')
          reports  = json.loads('$REPORTS')
          payload  = {
            'sourceStageOrder': 0,
            'targetStageOrder': 1,
            'isBackwardDeployment': False,
            'items': datasets + reports,
            'options': {
              'allowCreateArtifact': True,
              'allowOverwriteArtifact': True,
              'allowOverwriteTargetArtifactLabel': True
            }
          }
          print(json.dumps(payload))
          ")

          echo "🚀 Triggering: Dev (stage 0) → QA (stage 1)"
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.powerbi.com/v1.0/myorg/pipelines/$PIPELINE_ID/deploy" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            OPERATION_ID=$(echo $BODY | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "📋 Operation ID: $OPERATION_ID"
            echo "OPERATION_ID=$OPERATION_ID" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to trigger pipeline (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Poll for deployment completion
        run: |
          ACCESS_TOKEN="${{ steps.get_token.outputs.ACCESS_TOKEN }}"
          PIPELINE_ID="${{ secrets.PBI_PIPELINE_ID }}"
          OPERATION_ID="${{ steps.deploy.outputs.OPERATION_ID }}"
          MAX_WAIT=30
          ITERATION=0

          echo "⏳ Polling for completion..."

          while [ $ITERATION -lt $MAX_WAIT ]; do
            sleep 10
            ITERATION=$((ITERATION + 1))

            STATUS_RESPONSE=$(curl -s \
              "https://api.powerbi.com/v1.0/myorg/pipelines/$PIPELINE_ID/operations/$OPERATION_ID" \
              -H "Authorization: Bearer $ACCESS_TOKEN")

            STATUS=$(echo $STATUS_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))")
            echo "   Check $ITERATION/$MAX_WAIT — Status: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Dev → QA promotion succeeded"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Deployment pipeline failed"
              echo "$STATUS_RESPONSE"
              exit 1
            fi
          done

          echo "❌ Timed out waiting for deployment"
          exit 1

      - name: Summary
        if: success()
        run: |
          echo "=========================================="
          echo "  ✅  Dev → QA Promotion Complete"
          echo "  URL : https://app.powerbi.com/groups/${{ secrets.PBI_QA_WORKSPACE_ID }}/list"
          echo "=========================================="